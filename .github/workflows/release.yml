name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0). Leave empty to use metadata.txt.'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Qt tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qtdeclarative5-dev-tools \
            qml-module-qttest \
            qml-module-qtquick2 \
            qml-module-qtquick-controls2 \
            qml-module-qtquick-layouts \
            qml-module-qtquick-window2 \
            xvfb

      - name: Lint
        run: npm run lint

      - name: Run JS tests
        run: npm run test:js

      - name: Run QML tests
        run: xvfb-run --auto-servernum npm run test:qml

      - name: Resolve version
        id: version
        run: |
          META_VERSION=$(grep -m1 '^version=' metadata.txt | cut -d'=' -f2 | tr -d '[:space:]')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$META_VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "META_VERSION=$META_VERSION" >> $GITHUB_OUTPUT

      - name: Validate version matches metadata.txt
        run: |
          if [ "${{ steps.version.outputs.VERSION }}" != "${{ steps.version.outputs.META_VERSION }}" ]; then
            echo "ERROR: Requested version (${{ steps.version.outputs.VERSION }}) does not match metadata.txt (${{ steps.version.outputs.META_VERSION }})."
            echo "Update metadata.txt before releasing."
            exit 1
          fi

      - name: Build release ZIP
        id: build
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIP_NAME="QField4OBM-${VERSION}.zip"
          zip -r "$ZIP_NAME" \
            main.qml \
            scripts \
            components \
            metadata.txt \
            *.png \
            *.svg
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: ${{ steps.build.outputs.ZIP_NAME }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ inputs.prerelease || contains(github.ref_name, '-') }}
